<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>入店記録 | ウルトラZAIMUくん PC版</title>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="css/pc.css">
</head>
<body class="pc-body">
<div id="pc-app" class="pc-layout">
  <main class="pc-main" id="pc-main">
    <div class="pc-body-inner">
      <div class="pc-card">
        <div class="pc-filter-row">
          <label>月
            <input type="month" id="f-month" class="pc-input">
          </label>
          <button id="btn-reload" class="pc-btn pc-btn--ghost">再読み込み</button>
        </div>
        <div style="overflow-x:auto;">
          <table class="pc-table" id="att-table">
            <thead>
              <tr>
                <th style="width:110px;">日付</th>
                <th>スタッフ名</th>
                <th style="width:90px;">入店</th>
                <th style="width:90px;">退店</th>
                <th style="width:100px;">稼働時間</th>
                <th style="width:120px;">操作</th>
              </tr>
            </thead>
            <tbody id="att-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../js/app.js"></script>
<script src="js/pc-common.js"></script>
<script src="js/pc-clockin.js"></script>
</body>
</html>
