<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>売上・コスト入力 | ウルトラ財務くん PC版</title>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="css/pc.css">
</head>
<body class="pc-body">
<div id="pc-app" class="pc-layout">
  <main class="pc-main" id="pc-main">
    <div class="pc-body-inner">
      <div class="pc-tabs">
        <button class="pc-tab active" data-tab="sales">売上</button>
        <button class="pc-tab" data-tab="cost">コスト</button>
      </div>

      <div class="pc-card">
        <div class="pc-filter-row">
          <label>月
            <input type="month" id="f-month" class="pc-input">
          </label>
          <label>区分
            <select id="f-division" class="pc-select">
              <option value="all">全て</option>
              <option value="misc">諸口</option>
              <option value="fixed">登録科目</option>
            </select>
          </label>
          <label>状態
            <select id="f-status" class="pc-select">
              <option value="all">全て</option>
              <option value="unpaid">未収/未払</option>
              <option value="locked">ロック</option>
            </select>
          </label>
          <button id="btn-new" class="pc-btn">＋ 新規追加</button>
          <button id="btn-reload" class="pc-btn pc-btn--ghost">再読み込み</button>
        </div>
        <div style="overflow-x:auto;">
          <table class="pc-table" id="grid-table">
            <thead id="grid-head"></thead>
            <tbody id="grid-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../js/app.js"></script>
<script src="js/pc-common.js"></script>
<script src="js/pc-sales.js"></script>
</body>
</html>
