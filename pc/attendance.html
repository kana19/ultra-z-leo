<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>出勤管理 | ウルトラZAIMUくんレオ</title>
<link rel="icon" type="image/png" href="../icons/icon-192.png">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="css/pc.css">
<link rel="stylesheet" href="css/pc-attendance.css">
</head>
<body class="pc-body">
<div id="pc-app" class="pc-layout">
  <main class="pc-main" id="pc-main">

    <!-- ===== 3ゾーングリッド ===== -->
    <div class="att-grid" id="attGrid">

      <!-- ゾーンA：スタッフ一覧 -->
      <aside class="att-zone-a" id="zoneA">
        <div class="att-zone-a__header">
          <h2 class="att-section-title">スタッフ</h2>
          <select class="att-filter" id="staffFilter">
            <option value="all">全て</option>
            <option value="employed_full">常勤雇用</option>
            <option value="employed_part">臨時バイト</option>
            <option value="contractor">委託・外注</option>
          </select>
        </div>
        <div class="att-staff-list" id="staffList"></div>
      </aside>

      <!-- ゾーンB：出勤マトリクス -->
      <section class="att-zone-b" id="zoneB">
        <div class="att-zone-b__header">
          <button class="att-month-nav" id="prevMonth">&lt;</button>
          <span class="att-month-label" id="monthLabel">2026年5月</span>
          <button class="att-month-nav" id="nextMonth">&gt;</button>
        </div>
        <div class="att-matrix-wrap" id="matrixWrap">
          <table class="att-matrix" id="matrixTable">
            <thead id="matrixHead"></thead>
            <tbody id="matrixBody"></tbody>
            <tfoot id="matrixFoot"></tfoot>
          </table>
        </div>
      </section>

      <!-- ゾーンC：給与計算セクション -->
      <aside class="att-zone-c" id="zoneC">
        <h2 class="att-section-title">給与計算</h2>
        <div class="att-payroll" id="payrollPanel">
          <div class="att-payroll__empty" id="payrollEmpty">
            <span>← スタッフを選択してください</span>
          </div>
          <div class="att-payroll__content" id="payrollContent" style="display:none;">
            <div class="att-pr-header" id="prHeader"></div>
            <div class="att-pr-section">
              <label class="att-pr-label">給与算出方式</label>
              <div class="att-pr-radios" id="payTypeRadios">
                <label><input type="radio" name="payType" value="hourly" checked> 時給</label>
                <label><input type="radio" name="payType" value="daily"> 日給</label>
                <label><input type="radio" name="payType" value="monthly"> 月給・歩合</label>
              </div>
            </div>
            <div class="att-pr-section">
              <div class="att-pr-field">
                <label>単価</label>
                <input type="number" id="prUnitPrice" class="att-pr-input" placeholder="0">
                <span class="att-pr-unit">円</span>
              </div>
              <div class="att-pr-field">
                <label>実労働時間</label>
                <input type="number" id="prWorkHours" class="att-pr-input" step="0.5" placeholder="0">
                <span class="att-pr-unit">H</span>
                <span class="att-pr-auto-badge" id="prHoursBadge">自動</span>
              </div>
              <div class="att-pr-field">
                <label>出勤日数</label>
                <input type="number" id="prWorkDays" class="att-pr-input" placeholder="0">
                <span class="att-pr-unit">日</span>
                <span class="att-pr-auto-badge" id="prDaysBadge">自動</span>
              </div>
              <div class="att-pr-field att-pr-field--result">
                <label>算出金額</label>
                <input type="number" id="prGrossAmount" class="att-pr-input att-pr-input--large" placeholder="0">
                <span class="att-pr-unit">円</span>
                <span class="att-pr-auto-badge" id="prGrossBadge">自動</span>
              </div>
            </div>
            <div class="att-pr-section">
              <label class="att-pr-label">源泉徴収</label>
              <div class="att-pr-radios" id="whRadios">
                <label><input type="radio" name="whMode" value="off"> 対象外</label>
                <label><input type="radio" name="whMode" value="standard"> 一般報酬</label>
                <label><input type="radio" name="whMode" value="hostess"> ホステス特例</label>
              </div>
              <div class="att-pr-field">
                <label>源泉徴収額</label>
                <input type="number" id="prWhAmount" class="att-pr-input" placeholder="0">
                <span class="att-pr-unit">円</span>
                <span class="att-pr-auto-badge" id="prWhBadge">自動</span>
              </div>
            </div>
            <div class="att-pr-section att-pr-section--net">
              <div class="att-pr-field att-pr-field--result">
                <label>差引支給額</label>
                <span class="att-pr-net-amount" id="prNetAmount">0</span>
                <span class="att-pr-unit">円</span>
              </div>
            </div>
            <div class="att-pr-section">
              <label class="att-pr-label">対象コスト行</label>
              <div class="att-pr-cost-rows" id="prCostRows"></div>
              <div class="att-pr-cost-total" id="prCostTotal"></div>
            </div>
            <div class="att-pr-section">
              <label class="att-pr-label">経営メモ</label>
              <textarea class="att-pr-memo" id="prMemo" rows="3" placeholder="歩合の設定根拠・給与振込口座・スタッフとの約束など"></textarea>
            </div>
            <button class="att-pr-confirm-btn" id="prConfirmBtn">確定する</button>
          </div>
        </div>
        <div class="att-pr-tax-advisor" id="taxAdvisorSection">
          <h3 class="att-pr-sub-title">税理士等の報酬（code 25）</h3>
          <div id="taxAdvisorRows"></div>
          <button class="att-pr-confirm-btn att-pr-confirm-btn--sub" id="taxAdvisorConfirmBtn">一括確定</button>
        </div>
      </aside>

    </div>

  </main>
</div>

<!-- 日別セル編集ポップオーバー -->
<div class="att-popover" id="dayCellPopover" style="display:none;">
  <div class="att-popover__inner">
    <div class="att-popover__header" id="popoverHeader"></div>
    <div class="att-popover__field">
      <label>入店時刻</label>
      <input type="time" id="popClockIn">
    </div>
    <div class="att-popover__field">
      <label>退店時刻</label>
      <input type="time" id="popClockOut">
    </div>
    <div class="att-popover__field">
      <label>メモ</label>
      <input type="text" id="popMemo" placeholder="遅刻理由・早退等">
    </div>
    <div class="att-popover__actions">
      <button class="att-popover__cancel" id="popCancel">キャンセル</button>
      <button class="att-popover__save" id="popSave">保存</button>
    </div>
  </div>
</div>

<!-- 確定ダイアログ -->
<div class="att-confirm-dialog" id="confirmDialog" style="display:none;">
  <div class="att-confirm-dialog__inner">
    <h3>以下の内容で確定しますか？</h3>
    <div class="att-confirm-dialog__body" id="confirmBody"></div>
    <div class="att-confirm-dialog__actions">
      <button class="att-confirm-dialog__cancel" id="confirmCancel">キャンセル</button>
      <button class="att-confirm-dialog__ok" id="confirmOk">確定</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="js/pc-common.js"></script>
<script src="js/pc-attendance.js"></script>
</body>
</html>
