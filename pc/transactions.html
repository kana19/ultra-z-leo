<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>取引一覧 | ウルトラZAIMUくん PC版</title>
<link rel="icon" type="image/png" href="../icons/icon-192.png">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="css/pc.css">
</head>
<body class="pc-body">
<div id="pc-app" class="pc-layout">
  <main class="pc-main" id="pc-main">
    <div class="pc-body-inner">

      <div class="tx-toolbar">
        <label>月
          <select id="tx-month" class="pc-select"></select>
        </label>
        <button id="tx-reload" class="pc-btn pc-btn--ghost">再読み込み</button>
        <button id="tx-add-sales-row" class="pc-btn">＋ 売上行を追加</button>
        <button id="tx-add-cost-row" class="pc-btn">＋ コスト行を追加</button>
        <span class="tx-toolbar-hint">クリックで編集／Tab次セル／Enter確定／Esc取消　※新規行は「登録」「取消」ボタンで明示確定</span>
      </div>

      <h3 class="tx-section-title">売上＝親 ／ 紐付けコスト＝子（取引ペア紐付けモデル）</h3>
      <div id="tx-hierarchy" class="tx-hierarchy"></div>

      <h3 class="tx-section-title">未紐付けコスト（集計対象4区分・対象月）</h3>
      <p class="pc-note">対象は仕入原価系すべて／給料賃金／外注工賃／税理士等の報酬。固定費（光熱費・地代等）は紐付け対象外で青色申告書の損益計算には影響しません。</p>
      <div id="tx-unlinked-costs" class="tx-unlinked"></div>

      <div id="link-popover" class="link-popover" style="display:none"></div>

    </div>
  </main>
</div>
<script src="../js/app.js"></script>
<script src="js/pc-common.js"></script>
<script src="js/pc-transactions.js"></script>
</body>
</html>
