<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>取引一覧 | ウルトラZAIMUくん PC版</title>
<link rel="icon" type="image/png" href="../icons/icon-192.png">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="css/pc.css">
</head>
<body class="pc-body">
<div id="pc-app" class="pc-layout">
  <main class="pc-main" id="pc-main">
    <div class="pc-body-inner">
      <div class="pc-card">
        <div class="pc-filter-row">
          <label>種別
            <select id="pc-tx-filter-type" class="pc-select">
              <option value="all">全て</option>
              <option value="sales">売上のみ</option>
              <option value="cost-cogs">仕入原価のみ</option>
              <option value="cost-sga">販管費のみ</option>
            </select>
          </label>
          <label>月
            <input type="month" id="pc-tx-filter-month" class="pc-input">
          </label>
          <label class="pc-tx-filter-project">案件
            <select id="pc-tx-filter-project" class="pc-select">
              <option value="all">全て</option>
              <option value="unlinked">未紐付け</option>
            </select>
          </label>
          <label>状態
            <select id="pc-tx-filter-status" class="pc-select">
              <option value="all">全て</option>
              <option value="unsettled">未収・未払のみ</option>
              <option value="settled">消込済のみ</option>
            </select>
          </label>
          <button id="pc-tx-add-btn" class="pc-btn">＋ 新規追加</button>
          <button id="pc-tx-reload-btn" class="pc-btn pc-btn--ghost">再読み込み</button>
          <button id="pc-tx-project-master-btn" class="pc-btn pc-btn--ghost pc-tx-project-master-btn">案件マスタ管理</button>
        </div>

        <div class="pc-bulk-action-row" id="pc-tx-bulk-bar" style="display:none">
          <span class="pc-bulk-count" id="pc-tx-bulk-count">0件選択中</span>
          <select id="pc-tx-bulk-project" class="pc-select">
            <option value="">案件を選択...</option>
            <option value="__unlink__">— 紐付け解除 —</option>
          </select>
          <button id="pc-tx-bulk-apply" class="pc-primary-btn" disabled>一括紐付け</button>
        </div>

        <div style="overflow-x:auto;">
          <table class="pc-table" id="pc-tx-table">
            <thead id="pc-tx-thead"></thead>
            <tbody id="pc-tx-tbody"></tbody>
          </table>
        </div>
      </div>

      <div class="pc-card pc-tx-grossprofit-section" id="pc-tx-grossprofit-section">
        <h3>案件粗利集計</h3>
        <p class="pc-note">紐付けされた行を横串で集計しています。集計対象は「仕入原価／外注工賃／給料賃金（臨時雇用分）／税理士等の報酬（特定案件分）」のみで、固定費（光熱費・地代等）は対象外。青色申告決算書の損益計算には影響しません。</p>
        <div id="pc-tx-grossprofit-content"></div>
      </div>
    </div>
  </main>
</div>
<script src="../js/app.js"></script>
<script src="js/pc-common.js"></script>
<script src="js/pc-transactions.js"></script>
</body>
</html>
