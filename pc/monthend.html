<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>月末経理 | ウルトラZAIMUくん PC版</title>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="css/pc.css">
</head>
<body class="pc-body">
<div id="pc-app" class="pc-layout">
  <main class="pc-main" id="pc-main">
    <div class="pc-body-inner">
      <div class="pc-card">
        <div class="pc-filter-row">
          <label>月
            <input type="month" id="f-month" class="pc-input">
          </label>
          <button id="btn-reload" class="pc-btn pc-btn--ghost">再読み込み</button>
        </div>
      </div>

      <div class="pc-card" id="section-outsourcing">
        <div class="pc-section-title">外注工賃（ホステス報酬の源泉徴収）</div>
        <div id="outsourcing-body" class="pc-section-empty">読み込み中...</div>
      </div>

      <div class="pc-card" id="section-tax">
        <div class="pc-section-title">税理士等の報酬の源泉徴収</div>
        <div id="tax-body" class="pc-section-empty">読み込み中...</div>
      </div>

      <div class="pc-card" id="section-payroll">
        <div class="pc-section-title">給料賃金（雇用スタッフ給与）</div>
        <div id="payroll-body" class="pc-section-empty">読み込み中...</div>
      </div>

      <div id="confirm-row" style="display:none;">
        <span class="text-muted">※ 確定後はコストシートT列に源泉徴収額が遡及記録されます。AI自動確定は禁止されており、必ず内容確認後に確定してください。</span>
        <button id="btn-confirm" class="pc-btn">月末経理を確定</button>
      </div>
    </div>
  </main>
</div>
<script src="../js/app.js"></script>
<script src="js/pc-common.js"></script>
<script src="js/pc-monthend.js"></script>
</body>
</html>
