<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ホーム | ウルトラZAIMUくん PC版</title>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="css/pc.css">
</head>
<body class="pc-body">
<div id="pc-app" class="pc-layout">
  <main class="pc-main" id="pc-main">
    <div class="pc-body-inner">
      <div class="pc-card">
        <div class="pc-filter-row">
          <label>年
            <select id="pc-year" class="pc-select"></select>
          </label>
          <span class="text-muted" id="pc-status"></span>
          <div class="pc-tax-dl-row">
            <span class="text-muted" style="font-size:11px;">税理士用CSV:</span>
            <select id="pc-tax-from" class="pc-select" aria-label="開始月"></select>
            <span class="text-muted">〜</span>
            <select id="pc-tax-to" class="pc-select" aria-label="終了月"></select>
            <button id="pc-tax-dl-btn" class="pc-btn pc-btn--ghost" type="button">⬇️ DL</button>
          </div>
        </div>
        <div style="overflow-x:auto;">
          <table class="pl-table" id="pl-table">
            <thead><tr id="pl-head"></tr></thead>
            <tbody id="pl-body"></tbody>
          </table>
        </div>
      </div>
      <div class="pl-chart-wrap">
        <canvas id="pl-chart"></canvas>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="../js/app.js"></script>
<script src="js/pc-common.js"></script>
<script src="js/pc-home.js"></script>
</body>
</html>
