<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>月次管理 | ウルトラZAIMUくんレオ</title>
<link rel="icon" type="image/png" href="../icons/icon-192.png">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="css/pc.css">
</head>
<body class="pc-body">
<div id="pc-app" class="pc-layout">
  <main class="pc-main" id="pc-main">
    <div class="pc-body-inner">

      <!-- フィルタ -->
      <section class="pc-filter-bar" aria-label="月次管理フィルタ">
        <label>月：<select id="filter-month"></select></label>
        <label>状態：
          <select id="filter-status">
            <option value="all">すべて</option>
            <option value="unpaid">未収・未払のみ</option>
            <option value="locked">ロック行のみ</option>
          </select>
        </label>
        <label>種別：
          <select id="filter-type">
            <option value="all">すべて</option>
            <option value="売上">売上</option>
            <option value="仕入原価">仕入原価</option>
            <option value="販管費">販管費</option>
            <option value="委託・外注">委託・外注</option>
            <option value="人件費">人件費</option>
          </select>
        </label>
        <label>案件マーカー：
          <select id="filter-project">
            <option value="all">すべて</option>
            <option value="project">案件のみ</option>
            <option value="normal">通常のみ</option>
          </select>
        </label>
      </section>

      <!-- 行追加ボタン（テーブル上部・指示書5§2-2 / 戦略思想§4-3） -->
      <section class="pc-add-buttons">
        <button type="button" id="btn-add-sales">+ 売上行を追加</button>
        <button type="button" id="btn-add-cost">+ コスト行を追加</button>
      </section>

      <!-- フラットテーブル（code列廃止・指示書5§2-1 / 技術仕様§9-4） -->
      <section class="pc-table-wrap">
        <table class="pc-monthly-table" id="monthly-table">
          <thead>
            <tr>
              <th>発生日</th>
              <th>種別</th>
              <th>科目</th>
              <th class="num">金額(税込)</th>
              <th>税率</th>
              <th class="num">消費税</th>
              <th>メモ</th>
              <th>案件</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="monthly-tbody">
            <tr><td colspan="9" class="loading">読み込み中…</td></tr>
          </tbody>
        </table>
      </section>

    </div>
  </main>
</div>

<!-- 紐付け候補モーダル（指示書5§2-4・JS から開閉する） -->
<div class="pc-link-candidates-modal" id="pc-link-candidates-modal" hidden>
  <div class="pc-link-candidates-backdrop" data-action="cancel"></div>
  <div class="pc-link-candidates-panel" role="dialog" aria-modal="true" aria-labelledby="pc-link-candidates-title">
    <header class="pc-link-candidates-header">
      <h2 id="pc-link-candidates-title">紐付け候補を選択</h2>
      <button type="button" class="pc-link-candidates-close" aria-label="閉じる" data-action="cancel">×</button>
    </header>
    <p class="pc-link-candidates-hint" id="pc-link-candidates-hint"></p>
    <div class="pc-link-candidates-list" id="pc-link-candidates-list" role="group"></div>
    <p class="pc-link-candidates-error" id="pc-link-candidates-error" hidden></p>
    <footer class="pc-link-candidates-footer">
      <button type="button" class="pc-btn pc-btn-secondary" data-action="cancel">取消</button>
      <button type="button" class="pc-btn pc-btn-primary" data-action="confirm" id="pc-link-candidates-confirm">確定</button>
    </footer>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="js/pc-common.js"></script>
<script src="js/pc-monthly.js"></script>
</body>
</html>
