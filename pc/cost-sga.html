<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>販管費入力 | ウルトラZAIMUくん PC版</title>
<link rel="icon" type="image/png" href="../icons/icon-192.png">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="css/pc.css">
</head>
<body class="pc-body">
<div id="pc-app" class="pc-layout">
  <main class="pc-main" id="pc-main">
    <div class="pc-body-inner">
      <div class="pc-card">
        <div class="pc-filter-row">
          <label>月
            <input type="month" id="f-month" class="pc-input">
          </label>
          <label>科目
            <select id="f-itemcode" class="pc-select">
              <option value="">全て</option>
            </select>
          </label>
          <label>状態
            <select id="f-status" class="pc-select">
              <option value="all">全て</option>
              <option value="unpaid">未払のみ</option>
              <option value="paid">支払済</option>
            </select>
          </label>
          <button id="btn-new" class="pc-btn">＋ 新規追加</button>
          <button id="btn-reload" class="pc-btn pc-btn--ghost">再読み込み</button>
        </div>
        <div style="overflow-x:auto;">
          <table class="pc-table" id="grid-table">
            <thead id="grid-head"></thead>
            <tbody id="grid-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../js/app.js"></script>
<script src="js/pc-common.js"></script>
<script src="js/pc-cost-sga.js"></script>
</body>
</html>
