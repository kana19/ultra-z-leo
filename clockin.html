<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>入店記録 — ウルトラ財務くん</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

<div class="page-wrapper">

  <!-- サブページヘッダー -->
  <header class="sub-header">
    <a href="index.html" class="sub-header__back" aria-label="ホームに戻る">‹ 戻る</a>
    <span class="sub-header__title">入店記録</span>
    <div style="width:60px;"></div>
  </header>

  <!-- スクロール本体 -->
  <div style="padding:0 0 calc(80px + env(safe-area-inset-bottom));">

    <!-- ① スタッフ選択 -->
    <div class="form-section">
      <span class="form-section__label">スタッフを選ぶ</span>
      <div id="staff-btns"
           class="quick-staff-group"
           role="group"
           aria-label="スタッフ選択">
        <!-- clockin.js が描画 -->
      </div>
    </div>

    <!-- ② 名前テキスト入力（マスタ外スタッフ対応） -->
    <div class="form-section">
      <label class="form-section__label" for="name-input">または名前を入力</label>
      <input type="text"
             id="name-input"
             class="text-input"
             placeholder="例：まりこ、アルバイトA"
             maxlength="20"
             autocomplete="off"
             aria-label="スタッフ名">
      <p class="form-hint">マスタ未登録のスタッフも記録できます。</p>
    </div>

    <!-- ③ 入店・退店入力フォーム（スタッフ選択後に表示） -->
    <div id="entry-form-section" hidden>

      <div class="form-section">
        <span class="form-section__label">日付</span>
        <input type="date"
               id="form-date"
               class="date-input"
               style="width:100%;margin-top:4px;"
               aria-label="日付">
      </div>

      <div class="form-section">
        <span class="form-section__label">入店時刻</span>
        <input type="time"
               id="form-clockin"
               class="date-input"
               style="width:100%;margin-top:4px;"
               aria-label="入店時刻">
      </div>

      <div class="form-section">
        <span class="form-section__label">退店時刻
          <span style="font-size:11px;font-weight:400;color:var(--uz-muted);margin-left:6px;">任意</span>
        </span>
        <input type="time"
               id="form-clockout"
               class="date-input"
               style="width:100%;margin-top:4px;"
               aria-label="退店時刻">
        <p class="form-hint">空欄のままにすると「退店未記録」で登録されます。</p>
      </div>

    </div>

    <!-- ④ 本日の勤怠一覧 -->
    <div class="form-section" style="padding-bottom:8px;">
      <span class="form-section__label">本日の勤怠</span>
    </div>
    <div id="attendance-list"
         class="attendance-list"
         style="padding:0 16px 16px;"
         aria-label="本日の勤怠一覧">
      <!-- clockin.js が描画 -->
    </div>

  </div>

</div><!-- /page-wrapper -->

<!-- 登録ボタン（固定） -->
<div id="submit-bar" class="clockin-submit-bar" hidden>
  <button id="submit-btn"
          class="clockin-btn"
          type="button"
          disabled
          aria-label="記録する">
    登録する
  </button>
</div>

<!-- ローディングオーバーレイ -->
<div id="loading-overlay" class="loading-overlay" aria-hidden="true">
  <div class="spinner"></div>
</div>

<!-- AIフック（フェーズ3用・削除禁止） -->
<div id="receipt-capture-area" style="display:none"></div>
<div id="csv-import-area"      style="display:none"></div>
<div id="ai-suggestion-area"   style="display:none"></div>

<script src="js/app.js"></script>
<script src="js/clockin.js"></script>
</body>
</html>
