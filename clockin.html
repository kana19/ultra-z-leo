<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#12100E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>入店記録 — ウルトラ財務くん</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body data-page="clockin">

<!-- iPad サイドバーナビ（スマホでは非表示） -->
<nav class="nav-sidebar" aria-label="メインナビゲーション">
  <div class="nav-sidebar__logo">ウルトラ財務くん</div>
  <a href="index.html" class="sidebar-item">
    <span class="sidebar-item__icon" aria-hidden="true">🏠</span>
    <span>ホーム</span>
  </a>
  <a href="sales.html" class="sidebar-item">
    <span class="sidebar-item__icon" aria-hidden="true">💰</span>
    <span>売上コスト入力</span>
  </a>
  <a href="clockin.html" class="sidebar-item sidebar-item--active" aria-current="page">
    <span class="sidebar-item__icon" aria-hidden="true">🕐</span>
    <span>入店記録</span>
  </a>
  <a href="history.html" class="sidebar-item">
    <span class="sidebar-item__icon" aria-hidden="true">📝</span>
    <span>履歴・修正</span>
  </a>
  <a href="settings.html" class="sidebar-item">
    <span class="sidebar-item__icon" aria-hidden="true">⚙️</span>
    <span>設定</span>
  </a>
</nav>

<div class="page-wrapper">

  <!-- サブページヘッダー -->
  <header class="sub-header">
    <a href="index.html" class="sub-header__back" aria-label="ホームに戻る">‹ 戻る</a>
    <span class="sub-header__title">入店記録</span>
    <div style="width:60px;"></div>
  </header>

  <!-- iPad 2カラムラッパー -->
  <div class="ipad-form-wrap">

    <!-- 左カラム：入退店登録フォーム -->
    <div class="ipad-clockin-left">

      <!-- ① スタッフ選択 -->
      <div class="form-section">
        <span class="form-section__label">スタッフを選ぶ</span>
        <div id="staff-btns"
             class="quick-staff-group"
             role="group"
             aria-label="スタッフ選択">
          <!-- clockin.js が描画 -->
        </div>
      </div>

      <!-- ② 名前テキスト入力（マスタ外スタッフ対応） -->
      <div class="form-section">
        <label class="form-section__label" for="name-input">または名前を入力</label>
        <input type="text"
               id="name-input"
               class="text-input"
               placeholder="例：まりこ、アルバイトA"
               maxlength="20"
               autocomplete="off"
               aria-label="スタッフ名">
        <p class="form-hint">マスタ未登録のスタッフも記録できます。</p>
      </div>

      <!-- ③ 入店・退店入力フォーム（スタッフ選択後に表示） -->
      <div id="entry-form-section" hidden>

        <div class="form-section">
          <span class="form-section__label">日付</span>
          <input type="date"
                 id="form-date"
                 class="date-input"
                 style="width:100%;margin-top:4px;"
                 aria-label="日付">
        </div>

        <div class="form-section">
          <span class="form-section__label">入店時刻</span>
          <div style="display:flex;align-items:center;gap:6px;margin-top:4px;">
            <select id="form-clockin-h" class="date-input" style="width:72px;" aria-label="入店時刻（時）"></select>
            <span style="color:var(--uz-text);font-weight:600;font-size:16px;">:</span>
            <select id="form-clockin-m" class="date-input" style="width:72px;" aria-label="入店時刻（分）"></select>
          </div>
        </div>

        <div class="form-section">
          <span class="form-section__label">退店時刻
            <span style="font-size:11px;font-weight:400;color:var(--uz-muted);margin-left:6px;">任意</span>
          </span>
          <div style="display:flex;align-items:center;gap:6px;margin-top:4px;">
            <select id="form-clockout-h" class="date-input" style="width:72px;" aria-label="退店時刻（時）"></select>
            <span style="color:var(--uz-text);font-weight:600;font-size:16px;">:</span>
            <select id="form-clockout-m" class="date-input" style="width:72px;" aria-label="退店時刻（分）"></select>
          </div>
          <p class="form-hint">未選択のままにすると「退店未記録」で登録されます。</p>
        </div>

      </div><!-- /entry-form-section -->

    </div><!-- /ipad-clockin-left -->

    <!-- 右カラム：本日の出退勤状況 -->
    <div class="ipad-clockin-right">
      <div id="attendance-list"
           class="attendance-list"
           style="padding:0 0 16px;"
           aria-label="本日の勤怠一覧">
        <!-- clockin.js が描画 -->
      </div>
    </div><!-- /ipad-clockin-right -->

  </div><!-- /ipad-form-wrap -->

  <!-- iPad 入店記録パネル（iPad のみ表示） -->
  <div class="ipad-clockin-panel" id="ipad-clockin-panel">

    <!-- 左：スタッフカード一覧 -->
    <div class="ipad-ci-left">
      <div class="ipad-ci-section-label">スタッフを選択</div>
      <div id="ipad-staff-cards" class="ipad-staff-cards">
        <div class="ipad-list-empty">読み込み中...</div>
      </div>
    </div>

    <!-- 右：操作パネル -->
    <div class="ipad-ci-right">
      <div class="ipad-ci-empty" id="ipad-ci-empty">
        スタッフを選択してください
      </div>
      <div class="ipad-ci-operation" id="ipad-ci-operation" style="display:none">
        <div class="ipad-ci-staff-header" id="ipad-ci-staff-header"></div>
        <div class="ipad-input-tabs">
          <button class="ipad-tab ipad-tab--active" data-ci-tab="in" type="button">入店を記録</button>
          <button class="ipad-tab" data-ci-tab="out" type="button">退店を記録</button>
        </div>
        <!-- 入店タブ -->
        <div id="ipad-ci-tab-in" class="ipad-tab-content ipad-ci-form-wrap">
          <div class="ipad-ci-form">
            <div class="ipad-ci-field">
              <label class="ipad-ci-label">日付</label>
              <input type="date" id="ipad-ci-date" class="date-input" style="width:100%;">
            </div>
            <div class="ipad-ci-field">
              <label class="ipad-ci-label">入店時刻</label>
              <div style="display:flex;align-items:center;gap:6px;">
                <select id="ipad-ci-in-h" class="date-input" style="width:72px;" aria-label="入店時刻（時）"></select>
                <span style="color:var(--uz-text);font-weight:600;font-size:16px;">:</span>
                <select id="ipad-ci-in-m" class="date-input" style="width:72px;" aria-label="入店時刻（分）"></select>
              </div>
            </div>
            <div class="ipad-ci-field">
              <label class="ipad-ci-label">退店時刻 <span style="font-size:11px;font-weight:400;color:var(--uz-muted);margin-left:4px;">任意</span></label>
              <div style="display:flex;align-items:center;gap:6px;">
                <select id="ipad-ci-out-h" class="date-input" style="width:72px;" aria-label="退店時刻（時）"></select>
                <span style="color:var(--uz-text);font-weight:600;font-size:16px;">:</span>
                <select id="ipad-ci-out-m" class="date-input" style="width:72px;" aria-label="退店時刻（分）"></select>
              </div>
              <p class="form-hint">未選択のままにすると「退店未記録」で登録されます。</p>
            </div>
          </div>
          <button id="ipad-ci-submit-in" class="clockin-btn" type="button" style="width:100%;margin-top:8px;">
            入店を記録する
          </button>
        </div>
        <!-- 退店タブ -->
        <div id="ipad-ci-tab-out" class="ipad-tab-content ipad-ci-form-wrap" style="display:none">
          <div class="ipad-ci-form">
            <div class="ipad-ci-field">
              <label class="ipad-ci-label">退店時刻</label>
              <div style="display:flex;align-items:center;gap:6px;">
                <select id="ipad-co-out-h" class="date-input" style="width:72px;" aria-label="退店時刻（時）"></select>
                <span style="color:var(--uz-text);font-weight:600;font-size:16px;">:</span>
                <select id="ipad-co-out-m" class="date-input" style="width:72px;" aria-label="退店時刻（分）"></select>
              </div>
            </div>
          </div>
          <button id="ipad-ci-submit-out" class="clockin-btn" type="button" style="width:100%;margin-top:8px;">
            退店を記録する
          </button>
        </div>
      </div>
    </div>

  </div><!-- /ipad-clockin-panel -->

</div><!-- /page-wrapper -->

<!-- 登録ボタン（固定） -->
<div id="submit-bar" class="clockin-submit-bar" hidden>
  <button id="submit-btn"
          class="clockin-btn"
          type="button"
          disabled
          aria-label="記録する">
    登録する
  </button>
</div>

<!-- ローディングオーバーレイ -->
<div id="loading-overlay" class="loading-overlay" aria-hidden="true">
  <div class="spinner"></div>
</div>

<!-- AIフック（フェーズ3用・削除禁止） -->
<div id="receipt-capture-area" style="display:none"></div>
<div id="csv-import-area"      style="display:none"></div>
<div id="ai-suggestion-area"   style="display:none"></div>

<script src="js/app.js"></script>
<script src="js/clockin.js"></script>
</body>
</html>
