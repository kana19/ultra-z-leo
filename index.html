<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0B1842">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ウルトラZAIMUくん</title>
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
</head>
<body data-page="home">

<!-- iPad サイドバーナビ（スマホでは非表示） -->
<nav class="nav-sidebar" aria-label="メインナビゲーション">
  <div class="nav-sidebar__logo">ウルトラZAIMUくん</div>
  <a href="index.html" class="sidebar-item sidebar-item--active" aria-current="page">
    <span class="sidebar-item__icon" aria-hidden="true">🏠</span>
    <span>ホーム</span>
  </a>
  <a href="sales.html" class="sidebar-item">
    <span class="sidebar-item__icon" aria-hidden="true">💰</span>
    <span>売上コスト入力</span>
  </a>
  <a href="clockin.html" class="sidebar-item">
    <span class="sidebar-item__icon" aria-hidden="true">🕐</span>
    <span>入店記録</span>
  </a>
  <a href="history.html" class="sidebar-item">
    <span class="sidebar-item__icon" aria-hidden="true">📝</span>
    <span>履歴・修正</span>
  </a>
  <a href="settings.html" class="sidebar-item">
    <span class="sidebar-item__icon" aria-hidden="true">⚙️</span>
    <span>設定</span>
  </a>

  <!-- 最近の入力（iPad ホームのみ） -->
  <div class="sidebar-recent" id="sidebar-recent"></div>
</nav>

<div class="page-wrapper">

  <!-- ヘッダー -->
  <header class="app-header">
    <div class="app-header__store">スナック LEO</div>
    <div class="app-header__datetime">
      <div id="header-date" class="app-header__date">読み込み中...</div>
      <div id="header-time" class="app-header__time">--:--:--</div>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main class="page-body">

    <!-- ── iPad ホームダッシュボード（iPad のみ表示） ─── -->
    <div class="ipad-home-dashboard" id="ipad-home-dashboard" hidden>

      <!-- 左カラム（2/3幅） -->
      <div class="ipad-home-left">

        <!-- KPI カード（横並び） -->
        <div class="ipad-home-cards">
          <div class="ipad-kpi-card">
            <div class="ipad-kpi-card__label">今月の売上</div>
            <div class="ipad-kpi-card__value" id="ipad-sales-val">---</div>
          </div>
          <div class="ipad-kpi-card ipad-kpi-card--profit">
            <div class="ipad-kpi-card__label">経常利益</div>
            <div class="ipad-kpi-card__value" id="ipad-profit-val">---</div>
          </div>
        </div>

        <!-- 月次棒グラフ -->
        <div class="ipad-chart-wrap">
          <div class="ipad-chart-loading" id="ipad-chart-loading">データを読み込み中...</div>
          <canvas id="ipad-pl-chart"></canvas>
        </div>

        <!-- 損益5行テーブル -->
        <div class="ipad-pl-section">
          <div class="ipad-pl-header">
            <span class="ipad-pl-header__title">損益明細</span>
            <select id="ipad-month-select" class="ipad-month-select" aria-label="表示月"></select>
          </div>
          <table class="ipad-pl-table" id="ipad-pl-table">
            <tbody>
              <tr><td>売上</td><td id="ipad-pl-sales">¥—</td></tr>
              <tr><td>仕入原価</td><td id="ipad-pl-cogs">¥—</td></tr>
              <tr class="row-gross"><td>粗利</td><td id="ipad-pl-gross">¥—</td></tr>
              <tr><td>販管費</td><td id="ipad-pl-sga">¥—</td></tr>
              <tr class="row-profit"><td>経常利益</td><td id="ipad-pl-profit">¥—</td></tr>
            </tbody>
          </table>
        </div>

      </div><!-- /ipad-home-left -->

      <!-- 右カラム（1/3幅） -->
      <div class="ipad-home-right">

        <!-- 年度累計カード -->
        <div class="ipad-annual-card">
          <div class="ipad-annual-card__label">年度累計売上</div>
          <div class="ipad-annual-card__value" id="ipad-annual-sales">---</div>
        </div>
        <div class="ipad-annual-card ipad-annual-card--profit">
          <div class="ipad-annual-card__label">年度累計経常利益</div>
          <div class="ipad-annual-card__value" id="ipad-annual-profit">---</div>
        </div>

        <!-- 確定申告タイマー（期間中のみ） -->
        <div id="ipad-tax-timer-right"></div>

        <!-- DL・コピーボタン -->
        <div class="ipad-home-actions">
          <button class="ipad-btn-secondary" id="ipad-btn-copy" type="button">📋 コピー</button>
          <button class="ipad-btn-secondary" id="ipad-btn-dl"   type="button">⬇️ 税理士用CSV</button>
        </div>

        <!-- 税理士用CSV DLパネル（DLボタン押下で表示） -->
        <div class="ipad-tax-dl-panel" id="ipad-tax-dl-panel" hidden>
          <div class="ipad-tax-dl-row">
            <select id="ipad-tax-from" class="ipad-tax-select" aria-label="開始月"></select>
            <span class="ipad-tax-sep">〜</span>
            <select id="ipad-tax-to" class="ipad-tax-select" aria-label="終了月"></select>
          </div>
          <button id="ipad-tax-dl-exec" class="ipad-tax-dl-btn" type="button">ダウンロード実行</button>
        </div>

      </div><!-- /ipad-home-right -->

    </div><!-- /ipad-home-dashboard -->

    <!-- ── 左カラム（iPad）/ 通常表示（スマホ） ─── -->
    <div class="ipad-col--left">

      <!-- 入力セクション -->
      <section aria-label="入力ボタン">
        <div style="display:flex; flex-direction:column; gap:10px;">

          <!-- 売上入力ボタン -->
          <div style="position:relative;">
            <a href="sales.html" class="action-btn action-btn--sales" role="button">
              <span class="action-btn__icon" aria-hidden="true">💰</span>
              <span class="action-btn__label">売上を入れる</span>
            </a>
            <span id="dot-uncollected"
                  class="action-btn__dot"
                  style="display:flex; align-items:center; gap:4px;"
                  aria-label="未収あり">
            </span>
          </div>

          <!-- コスト入力ボタン -->
          <div style="position:relative;">
            <a href="cost.html" class="action-btn action-btn--cost" role="button">
              <span class="action-btn__icon" aria-hidden="true">💸</span>
              <span class="action-btn__label">コストを入れる</span>
            </a>
            <span id="dot-payable"
                  class="action-btn__dot"
                  style="display:flex; align-items:center; gap:4px;"
                  aria-label="買掛あり">
            </span>
          </div>

        </div>
      </section>

      <!-- 今月の損益 -->
      <section aria-label="今月の損益">
        <div class="card">
          <div class="card__header">今月の損益</div>
          <div class="card__body">
            <div id="pl-month-label" class="pl-month-label">読み込み中...</div>

            <!-- 売上 -->
            <div class="pl-row">
              <span class="pl-label">売上</span>
              <span id="pl-sales" class="pl-value">¥—</span>
            </div>

            <!-- 仕入原価 -->
            <div class="pl-row">
              <span class="pl-label">仕入原価</span>
              <span id="pl-cogs" class="pl-value">¥—</span>
            </div>

            <!-- 粗利 -->
            <div class="pl-row pl-row--result">
              <span class="pl-label">粗利</span>
              <span id="pl-gross" class="pl-value">¥—</span>
            </div>

            <!-- 販管費 -->
            <div class="pl-row">
              <span class="pl-label">販管費</span>
              <span id="pl-sga" class="pl-value">¥—</span>
            </div>

            <!-- 経常利益 -->
            <div class="pl-row pl-row--highlight">
              <span class="pl-label">経常利益</span>
              <span id="pl-profit" class="pl-value">¥—</span>
            </div>

          </div>
        </div>
        <div style="text-align:right; padding:6px 4px 0;">
          <a href="pl.html"
             style="font-size:12px; color:var(--uz-muted); text-decoration:none;">
            詳細を見る ›
          </a>
        </div>
      </section>

    </div><!-- /ipad-col--left -->

    <!-- ── 右カラム（iPad）/ 通常表示（スマホ） ─── -->
    <div class="ipad-col--right">

      <!-- 確定申告タイマー -->
      <div id="tax-timer" style="display:none"></div>

      <!-- 未収・買掛けショートカット -->
      <section aria-label="未収・買掛け">
        <a href="uncollected.html"
           class="action-btn action-btn--neutral"
           style="height:var(--btn-height-sm); font-size:15px;"
           role="button">
          <span class="action-btn__icon" aria-hidden="true">📋</span>
          <span class="action-btn__label">未収・買掛けを確認する</span>
          <span style="font-size:18px; color:var(--uz-muted);" aria-hidden="true">›</span>
        </a>
      </section>

    </div><!-- /ipad-col--right -->

  </main>

</div><!-- /page-wrapper -->

<!-- ── ボトムナビゲーション（スマホ用） ──────────────────── -->
<nav class="bottom-nav" aria-label="メインナビゲーション">

  <a href="index.html" class="nav-item nav-item--active" aria-current="page">
    <span class="nav-item__icon" aria-hidden="true">🏠</span>
    <span class="nav-item__label">ホーム</span>
  </a>

  <a href="pl.html" class="nav-item">
    <span class="nav-item__icon" aria-hidden="true">📊</span>
    <span class="nav-item__label">損益</span>
  </a>

  <a href="history.html" class="nav-item">
    <span class="nav-item__icon" aria-hidden="true">📝</span>
    <span class="nav-item__label">履歴・修正</span>
  </a>

  <a href="settings.html" class="nav-item">
    <span class="nav-item__icon" aria-hidden="true">⚙️</span>
    <span class="nav-item__label">設定</span>
  </a>

</nav>

<!-- ローディングオーバーレイ -->
<div id="loading-overlay" class="loading-overlay" aria-hidden="true">
  <div class="spinner"></div>
</div>

<!-- AIフック（フェーズ3用・削除禁止） -->
<div id="receipt-capture-area" style="display:none"></div>
<div id="csv-import-area"      style="display:none"></div>
<div id="ai-suggestion-area"   style="display:none"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="js/app.js"></script>
<script src="js/home.js"></script>
</body>
</html>
