<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#12100E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>損益サマリー — ウルトラ財務くん</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/pl.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

<div class="page-wrapper">

  <!-- ページタイトルヘッダー -->
  <header class="pl-header">
    <span class="pl-header__title">損益サマリー</span>
  </header>

  <!-- タブバー（月次 / 年度累計） -->
  <div class="pl-tab-bar" role="tablist" aria-label="表示期間">
    <button class="pl-tab pl-tab--active"
            data-tab="monthly"
            role="tab"
            aria-selected="true"
            aria-controls="monthly-section">月次</button>
    <button class="pl-tab"
            data-tab="ytd"
            role="tab"
            aria-selected="false"
            aria-controls="ytd-section">年度累計</button>
  </div>

  <!-- 比較インフォバナー（月次・年度累計 共用） -->
  <div id="compare-info"
       class="pl-compare-info"
       role="status"
       aria-live="polite"></div>

  <!-- ===== 月次セクション ===== -->
  <section id="monthly-section" role="tabpanel" aria-labelledby="tab-monthly">

    <!-- 月選択ナビゲーター -->
    <div class="pl-period-nav">
      <button id="period-prev"
              class="pl-period-btn"
              type="button"
              aria-label="前の月">‹</button>
      <span id="period-label" class="pl-period-label">読み込み中...</span>
      <button id="period-next"
              class="pl-period-btn"
              type="button"
              aria-label="次の月">›</button>
    </div>

    <!-- 前年同月比ボタン・税理士用DLボタン -->
    <div class="pl-compare-wrap">
      <button id="compare-btn"
              class="pl-compare-btn"
              type="button"
              aria-pressed="false">前年同月比</button>
      <button id="tax-download-btn"
              class="btn-tax-dl"
              type="button">税理士用スプレッドシートをDL</button>
    </div>

    <!-- PLテーブル（月次） -->
    <div id="pl-table"
         class="pl-table"
         role="region"
         aria-label="月次損益">
      <!-- pl.js が描画 -->
    </div>

    <div class="pl-footer-space"></div>
  </section>

  <!-- ===== 年度累計セクション ===== -->
  <section id="ytd-section" hidden role="tabpanel" aria-labelledby="tab-ytd">

    <!-- 年選択ナビゲーター -->
    <div class="pl-ytd-nav">
      <button id="ytd-prev"
              class="pl-period-btn"
              type="button"
              aria-label="前の年">‹</button>
      <span id="ytd-label" class="pl-ytd-label">読み込み中...</span>
      <button id="ytd-next"
              class="pl-period-btn"
              type="button"
              aria-label="次の年">›</button>
    </div>

    <!-- 前年比較ボタン -->
    <div class="pl-compare-wrap">
      <button id="ytd-compare-btn"
              class="pl-compare-btn"
              type="button"
              aria-pressed="false">前年比較</button>
    </div>

    <!-- PLテーブル（年度累計） -->
    <div id="ytd-pl-table"
         class="pl-table"
         role="region"
         aria-label="年度累計損益">
      <!-- pl.js が描画 -->
    </div>

    <!-- 確定申告サマリー -->
    <div id="tax-declaration-section"
         style="padding:0 16px 8px;"
         hidden>
      <div style="padding:12px 0 8px;font-size:13px;font-weight:700;color:var(--uz-muted);">
        確定申告 科目別集計（収支内訳書 行番号対応）
      </div>
      <div id="tax-declaration-table">
        <!-- pl.js が描画 -->
      </div>
    </div>

    <div class="pl-footer-space"></div>
  </section>

</div><!-- /page-wrapper -->

<!-- ボトムナビゲーション -->
<nav class="bottom-nav" aria-label="メインナビゲーション">

  <a href="index.html" class="nav-item">
    <span class="nav-item__icon" aria-hidden="true">🏠</span>
    <span class="nav-item__label">ホーム</span>
  </a>

  <a href="pl.html" class="nav-item nav-item--active" aria-current="page">
    <span class="nav-item__icon" aria-hidden="true">📊</span>
    <span class="nav-item__label">損益</span>
  </a>

  <a href="history.html" class="nav-item">
    <span class="nav-item__icon" aria-hidden="true">📝</span>
    <span class="nav-item__label">履歴・修正</span>
  </a>

  <a href="settings.html" class="nav-item">
    <span class="nav-item__icon" aria-hidden="true">⚙️</span>
    <span class="nav-item__label">設定</span>
  </a>

</nav>

<!-- AIフック（フェーズ3用・削除禁止） -->
<div id="receipt-capture-area" style="display:none"></div>
<div id="csv-import-area"      style="display:none"></div>
<div id="ai-suggestion-area"   style="display:none"></div>

<script src="js/app.js"></script>
<script src="js/pl.js"></script>
</body>
</html>
