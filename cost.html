<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>コスト入力 — ウルトラ財務くん</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/forms.css">
</head>
<body>

<div class="page-wrapper">

  <!-- サブページヘッダー -->
  <header class="sub-header">
    <a href="index.html" class="sub-header__back" aria-label="ホームに戻る">
      ‹ 戻る
    </a>
    <span class="sub-header__title">コスト入力</span>
    <div style="width:60px;"></div><!-- バランス用 -->
  </header>

  <!-- フォーム本体 -->
  <div class="form-body">

    <!-- ① 発生日 -->
    <div class="form-section">
      <label class="form-section__label" for="date-input">発生日</label>
      <input type="date"
             id="date-input"
             class="date-input"
             aria-label="発生日">
    </div>

    <!-- ② 区分選択（仕入原価 / 販管費） -->
    <div class="form-section">
      <span class="form-section__label">区分</span>
      <div class="division-group" role="group" aria-label="区分選択">
        <button class="division-btn" data-div="1" type="button">仕入原価</button>
        <button class="division-btn" data-div="2" type="button">販管費</button>
      </div>
    </div>

    <!-- ③ 科目選択（区分に応じて動的に変わる） -->
    <div class="form-section">
      <span class="form-section__label">科目</span>
      <div id="item-cards"
           class="radio-card-group radio-card-group--last-full"
           role="radiogroup"
           aria-label="科目選択">
        <!-- cost.js が描画 -->
      </div>
    </div>

    <!-- ④ 諸口科目名（諸口選択時のみ表示） -->
    <div class="form-section" id="misc-section" hidden>
      <label class="form-section__label" for="misc-name-input">科目名</label>
      <input type="text"
             id="misc-name-input"
             class="text-input text-input--red"
             placeholder="科目名を入力（例：協賛金、交際費）"
             maxlength="50"
             autocomplete="off">
      <p class="form-hint">マスタ未登録の科目を記録する場合に入力してください。</p>
    </div>

    <!-- ⑤ 税率 -->
    <div class="form-section">
      <span class="form-section__label">税率</span>
      <div class="tax-toggle" role="group" aria-label="税率選択">
        <button class="tax-btn" data-rate="0"  type="button" aria-pressed="false"> 0%</button>
        <button class="tax-btn" data-rate="8"  type="button" aria-pressed="false"> 8%</button>
        <button class="tax-btn" data-rate="10" type="button" aria-pressed="false">10%</button>
      </div>
      <p class="form-hint">科目のデフォルト税率が自動セットされます。変更は例外時のみ。</p>
    </div>

    <!-- ⑥ 金額入力 -->
    <div class="form-section">
      <span class="form-section__label">コスト入力（税込み）</span>

      <div class="amount-wrap amount-wrap--red">
        <span class="amount-prefix" aria-hidden="true">¥</span>
        <input type="text"
               id="amount-input"
               class="amount-input amount-input--red"
               inputmode="numeric"
               pattern="[0-9]*"
               placeholder="0"
               maxlength="10"
               autocomplete="off"
               aria-label="税込金額">
      </div>

      <!-- 税計算表示 -->
      <div class="tax-display" aria-live="polite">
        <div class="tax-display-item">
          <div class="tax-display-item__label">税抜金額</div>
          <div id="tax-excluded"
               class="tax-display-item__value tax-display-item__value--red">¥—</div>
        </div>
        <div class="tax-display-item">
          <div class="tax-display-item__label">消費税</div>
          <div id="tax-amount"
               class="tax-display-item__value tax-display-item__value--red">¥—</div>
        </div>
      </div>
    </div>

    <!-- ⑦ 買掛トグル -->
    <div class="form-section">
      <div class="toggle-row">
        <div class="toggle-row__left">
          <div class="toggle-row__title">買掛</div>
          <div class="toggle-row__desc">まだ支払っていない場合にON</div>
        </div>
        <label class="switch switch--red" aria-label="買掛としてマーク">
          <input type="checkbox" id="unpaid-toggle">
          <span class="switch-slider"></span>
        </label>
      </div>
    </div>

    <!-- ⑧ メモ -->
    <div class="form-section">
      <label class="form-section__label" for="memo-input">メモ（任意）</label>
      <input type="text"
             id="memo-input"
             class="text-input text-input--red"
             placeholder="例：〇〇酒販、月末締め翌月払い"
             maxlength="100"
             autocomplete="off">
    </div>

  </div><!-- /form-body -->

</div><!-- /page-wrapper -->

<!-- 登録ボタン（固定） -->
<div class="submit-bar">
  <button id="submit-btn" class="submit-btn submit-btn--red" type="button">
    登録する
  </button>
</div>

<!-- ローディングオーバーレイ -->
<div id="loading-overlay" class="loading-overlay" aria-hidden="true">
  <div class="spinner"></div>
</div>

<!-- AIフック（フェーズ3用・削除禁止） -->
<div id="receipt-capture-area" style="display:none"></div>
<div id="csv-import-area"      style="display:none"></div>
<div id="ai-suggestion-area"   style="display:none"></div>

<script src="js/app.js"></script>
<script src="js/cost.js"></script>
</body>
</html>
