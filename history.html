<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>入力履歴 — ウルトラ財務くん</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

<div class="page-wrapper">

  <!-- ページヘッダー -->
  <header class="history-header">
    <span class="history-header__title">入力履歴</span>
  </header>

  <!-- 直近の入力履歴（ダミーデータ） -->
  <div style="padding:16px 0 calc(var(--nav-height) + env(safe-area-inset-bottom) + 16px);"
       role="region"
       aria-label="入力履歴一覧">

    <!-- 日付グループ：2026/03/25 -->
    <div style="padding:12px 20px 6px;">
      <span style="font-size:12px;font-weight:700;color:var(--uz-muted);letter-spacing:0.06em;">
        2026年3月25日（水）
      </span>
    </div>

    <div class="history-item">
      <div class="history-item__type history-item__type--sales">💰</div>
      <div class="history-item__info">
        <div class="history-item__name">テーブルチャージ</div>
        <div class="history-item__date">3名来店</div>
      </div>
      <span class="history-item__amount history-item__amount--sales">¥33,000</span>
    </div>

    <div class="history-item">
      <div class="history-item__type history-item__type--cost">💸</div>
      <div class="history-item__info">
        <div class="history-item__name">酒類・飲料（仕入原価）</div>
        <div class="history-item__date">〇〇酒販</div>
      </div>
      <span class="history-item__amount history-item__amount--cost">¥42,000</span>
    </div>

    <!-- 日付グループ：2026/03/24 -->
    <div style="padding:16px 20px 6px;">
      <span style="font-size:12px;font-weight:700;color:var(--uz-muted);letter-spacing:0.06em;">
        2026年3月24日（火）
      </span>
    </div>

    <div class="history-item">
      <div class="history-item__type history-item__type--sales">💰</div>
      <div class="history-item__info">
        <div class="history-item__name">ボトルキープ</div>
        <div class="history-item__date">鈴木様</div>
      </div>
      <span class="history-item__amount history-item__amount--sales">¥55,000</span>
    </div>

    <div class="history-item">
      <div class="history-item__type history-item__type--sales">💰</div>
      <div class="history-item__info">
        <div class="history-item__name">カラオケ</div>
        <div class="history-item__date">2名</div>
      </div>
      <span class="history-item__amount history-item__amount--sales">¥22,000</span>
    </div>

    <div class="history-item">
      <div class="history-item__type history-item__type--cost">💸</div>
      <div class="history-item__info">
        <div class="history-item__name">光熱費（販管費）</div>
        <div class="history-item__date">電気代3月分</div>
      </div>
      <span class="history-item__amount history-item__amount--cost">¥42,000</span>
    </div>

    <!-- 日付グループ：2026/03/23 -->
    <div style="padding:16px 20px 6px;">
      <span style="font-size:12px;font-weight:700;color:var(--uz-muted);letter-spacing:0.06em;">
        2026年3月23日（月）
      </span>
    </div>

    <div class="history-item">
      <div class="history-item__type history-item__type--sales">💰</div>
      <div class="history-item__info">
        <div class="history-item__name">テーブルチャージ</div>
        <div class="history-item__date">田中様 4名</div>
      </div>
      <span class="history-item__amount history-item__amount--sales">¥44,000</span>
    </div>

    <p style="text-align:center;padding:20px;font-size:12px;color:var(--uz-muted);">
      GAS接続後に実際の履歴が表示されます
    </p>

  </div>

</div><!-- /page-wrapper -->

<!-- ボトムナビゲーション -->
<nav class="bottom-nav" aria-label="メインナビゲーション">

  <a href="index.html" class="nav-item">
    <span class="nav-item__icon" aria-hidden="true">🏠</span>
    <span class="nav-item__label">ホーム</span>
  </a>

  <a href="pl.html" class="nav-item">
    <span class="nav-item__icon" aria-hidden="true">📊</span>
    <span class="nav-item__label">損益</span>
  </a>

  <a href="history.html" class="nav-item nav-item--active" aria-current="page">
    <span class="nav-item__icon" aria-hidden="true">📝</span>
    <span class="nav-item__label">入力履歴</span>
  </a>

  <a href="settings.html" class="nav-item">
    <span class="nav-item__icon" aria-hidden="true">⚙️</span>
    <span class="nav-item__label">設定</span>
  </a>

</nav>

<!-- AIフック（フェーズ3用・削除禁止） -->
<div id="receipt-capture-area" style="display:none"></div>
<div id="csv-import-area"      style="display:none"></div>
<div id="ai-suggestion-area"   style="display:none"></div>

<script src="js/app.js"></script>
</body>
</html>
