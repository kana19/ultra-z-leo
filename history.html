<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>入力履歴 — ウルトラ財務くん</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    /* タブUI */
    .hist-tabs {
      display: flex;
      border-bottom: 1px solid var(--uz-border);
      background: var(--uz-surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .hist-tab {
      flex: 1;
      padding: 12px 4px;
      font-size: 13px;
      font-weight: 600;
      color: var(--uz-muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-family: var(--font-main);
      transition: color .15s, border-color .15s;
    }
    .hist-tab--active {
      color: var(--uz-text);
      border-bottom-color: var(--uz-blue);
    }
    .hist-tab-content { display: none; }
    .hist-tab-content--active { display: block; }

    /* 入店履歴スタッフカード */
    .attend-staff-card {
      margin: 8px 16px;
      background: var(--uz-surface);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--uz-border);
    }
    .attend-staff-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--uz-border);
    }
    .attend-staff-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--uz-text);
    }
    .attend-record-row {
      display: flex;
      align-items: center;
      padding: 8px 14px;
      gap: 8px;
      border-bottom: 1px solid var(--uz-border);
    }
    .attend-record-row:last-child { border-bottom: none; }
    .attend-record-date {
      font-size: 12px;
      color: var(--uz-muted);
      min-width: 80px;
    }
    .attend-record-times {
      font-size: 13px;
      color: var(--uz-text);
      flex: 1;
    }
    .attend-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }
    .attend-status--active {
      background: rgba(74,222,128,.15);
      color: #4ade80;
    }
    .attend-status--out {
      background: rgba(136,136,170,.12);
      color: var(--uz-muted);
    }
  </style>
</head>
<body>

<div class="page-wrapper">

  <!-- ページヘッダー -->
  <header class="history-header">
    <span class="history-header__title">入力履歴</span>
  </header>

  <!-- タブナビゲーション -->
  <div class="hist-tabs" role="tablist">
    <button id="tab-salescost"
            class="hist-tab hist-tab--active"
            type="button"
            role="tab"
            aria-selected="true"
            aria-controls="panel-salescost">
      売上・コスト
    </button>
    <button id="tab-attendance"
            class="hist-tab"
            type="button"
            role="tab"
            aria-selected="false"
            aria-controls="panel-attendance">
      入店履歴
    </button>
  </div>

  <!-- 月選択ナビゲーター（共通） -->
  <div class="pl-period-nav" style="padding:8px 16px;">
    <button id="hist-prev"
            class="pl-period-btn"
            type="button"
            aria-label="前の月">‹</button>
    <span id="hist-label" class="pl-period-label">読み込み中...</span>
    <button id="hist-next"
            class="pl-period-btn"
            type="button"
            aria-label="次の月">›</button>
  </div>

  <!-- タブ1：売上・コスト -->
  <div id="panel-salescost"
       class="hist-tab-content hist-tab-content--active"
       role="tabpanel"
       aria-labelledby="tab-salescost">
    <div id="history-list"
         style="padding:0 0 calc(var(--nav-height) + env(safe-area-inset-bottom) + 16px);"
         role="region"
         aria-label="売上・コスト履歴">
    </div>
  </div>

  <!-- タブ2：入店履歴 -->
  <div id="panel-attendance"
       class="hist-tab-content"
       role="tabpanel"
       aria-labelledby="tab-attendance">
    <div id="attendance-list"
         style="padding:0 0 calc(var(--nav-height) + env(safe-area-inset-bottom) + 16px);"
         role="region"
         aria-label="入店履歴">
    </div>
  </div>

</div><!-- /page-wrapper -->

<!-- ボトムナビゲーション -->
<nav class="bottom-nav" aria-label="メインナビゲーション">

  <a href="index.html" class="nav-item">
    <span class="nav-item__icon" aria-hidden="true">🏠</span>
    <span class="nav-item__label">ホーム</span>
  </a>

  <a href="pl.html" class="nav-item">
    <span class="nav-item__icon" aria-hidden="true">📊</span>
    <span class="nav-item__label">損益</span>
  </a>

  <a href="history.html" class="nav-item nav-item--active" aria-current="page">
    <span class="nav-item__icon" aria-hidden="true">📝</span>
    <span class="nav-item__label">入力履歴</span>
  </a>

  <a href="settings.html" class="nav-item">
    <span class="nav-item__icon" aria-hidden="true">⚙️</span>
    <span class="nav-item__label">設定</span>
  </a>

</nav>

<!-- ローディングオーバーレイ -->
<div id="loading-overlay" class="loading-overlay" aria-hidden="true">
  <div class="spinner"></div>
</div>

<!-- AIフック（フェーズ3用・削除禁止） -->
<div id="receipt-capture-area" style="display:none"></div>
<div id="csv-import-area"      style="display:none"></div>
<div id="ai-suggestion-area"   style="display:none"></div>

<script src="js/app.js"></script>
<script src="js/history.js"></script>
</body>
</html>
