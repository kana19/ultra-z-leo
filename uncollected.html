<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>未収・買掛け — ウルトラ財務くん</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

<div class="page-wrapper">

  <!-- サブページヘッダー -->
  <header class="sub-header" style="position:sticky;top:0;z-index:100;background:var(--uz-surface);border-bottom:1px solid var(--uz-border);display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 16px;">
    <a href="index.html" class="sub-header__back" aria-label="ホームに戻る">‹ 戻る</a>
    <span class="sub-header__title">未収・買掛け</span>
    <div style="width:60px;"></div>
  </header>

  <!-- 合計サマリーカード -->
  <div class="uc-summary" role="region" aria-label="合計金額">
    <div class="uc-summary-card uc-summary-card--uncollected">
      <div class="uc-summary-card__label">未収合計</div>
      <div id="total-uncollected" class="uc-summary-card__value">¥—</div>
    </div>
    <div class="uc-summary-card uc-summary-card--payable">
      <div class="uc-summary-card__label">買掛合計</div>
      <div id="total-payable" class="uc-summary-card__value">¥—</div>
    </div>
  </div>

  <!-- ══════ 未収セクション ══════ -->
  <div class="uc-section-header">
    <span class="uc-section-header__title">未収（売上の未入金）</span>
    <span id="uncollected-badge"
          class="uc-section-header__badge uc-badge--uncollected"
          style="display:none;"
          aria-live="polite">0件</span>
  </div>

  <div id="uncollected-list"
       role="region"
       aria-label="未収一覧">
    <!-- uncollected.js が描画 -->
  </div>

  <!-- ══════ 買掛けセクション ══════ -->
  <div class="uc-section-header" style="margin-top:8px;">
    <span class="uc-section-header__title">買掛（コストの未払い）</span>
    <span id="payable-badge"
          class="uc-section-header__badge uc-badge--payable"
          style="display:none;"
          aria-live="polite">0件</span>
  </div>

  <div id="payable-list"
       role="region"
       aria-label="買掛一覧">
    <!-- uncollected.js が描画 -->
  </div>

  <!-- 下部余白 -->
  <div style="height:24px;"></div>

</div><!-- /page-wrapper -->

<!-- ローディングオーバーレイ -->
<div id="loading-overlay" class="loading-overlay" aria-hidden="true">
  <div class="spinner"></div>
</div>

<!-- AIフック（フェーズ3用・削除禁止） -->
<div id="receipt-capture-area" style="display:none"></div>
<div id="csv-import-area"      style="display:none"></div>
<div id="ai-suggestion-area"   style="display:none"></div>

<script src="js/app.js"></script>
<script src="js/uncollected.js"></script>
</body>
</html>
